<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./reset.css"/>
  <style>
    body{
      background: url("./img/bg.jpg") no-repeat center top/100%;
    }
    .header{
      width: 1192px;
      height: 73px;
      margin: 0 auto;
      margin-top: 46px;
      background: url(./img/bg_nav.jpg) no-repeat 0 0/100% 100%;
      border: 2px solid #3f2a22;
      border-right: 0;
      border-left: 0;
      position: relative;
    }
    .header nav a{
      float: left;
      width: 163px;
      height: 73px;
      text-align: center;
      line-height: 73px;
      color: #e9b700;
      border: 1px solid #3f2a22;
      box-sizing: border-box;
      border-top: 0;
      border-bottom: 0;
    }
    .header nav a:nth-child(3){
      margin-right: 214px;
    }
    .clearfix::after{
      content: "";
      display: block;
      clear: both;
    }
    .header>a{
      position: absolute;
      width: 229px;
      height: 150px;
      left: 0;
      right: 0;
      top: -38px;
      margin: auto;

      background: url(./img/logo.png) no-repeat;
    }
    .header>a h1{
      display: none;
    }
    .more{
      text-align: center;
      margin-top: 625px;
    }
    .more a{
      display: inline-block;
      width: 322px;
      height: 95px;
      background: url(./img/btns.png) no-repeat;
    }
    .more .download{
      background-position: -322px;
    }
    .content{
      width: 1203px;
      margin: 0 auto;
      margin-top: 90px;
    }
    .content .item{
      width: 290px;
      height: 200px;
      float: left;
      outline: 1px #3f2a22 solid;
      margin-right: 14px;
    }
    .content .item:last-child{
      margin-right: 0;
    }
    .content .item .title{
      height: 55px;
      line-height: 55px;
      text-align: center;
      color: #e9b700;
      font-size: 20px;
      font-weight: bold;
      background-color: #211510;
    }
    .content .item .img{
      height: 145px;
    }
  </style>
</head>
<body>
