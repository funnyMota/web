<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;
      margin: 0;
    }
    .main img{
      width: 100%;
    }
    .modal{      
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color:rgba(0, 0, 0,0.5);
    }
    .modal .dialog{
      position: absolute;
      width: 404px;
      height: 404px;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      margin: auto;
      background-color: #fff;
      box-sizing: border-box;
      padding: 1em;
      border-radius: 5px;
    }
    .modal .dialog .close{
      position: absolute;
      width: 40px;
      height: 40px;
      right: 0;
      top: -20px;
      background-color: red;
      text-align: center;
      line-height: 40px;
      border-radius: 50%;
      border: 5px solid #fff;
      color: white;
    }
    .modal .dialog .close{
      cursor: pointer;
    }
  </style>
</head>
<body>
    <div class="main">
      <img src="./img/douyu.png" alt="">
    </div>
    <div class="modal">
      <div class="dialog">
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Voluptate aperiam, cumque nisi doloremque accusamus ex adipisci cum iste, vitae quod quibusdam iusto ullam voluptas excepturi autem laboriosam reprehenderit a sequi.
        <div class="close">
          X
        </div>
      </div>
    </div>
</body>
</html>
